services:
  - type: web
    name: smart-resume-scanner-backend
    env: python
    plan: free
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: gunicorn -w 4 -b 0.0.0.0:8000 "app:create_app()"
    root: backend
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        value: your-secret-key-change-this-in-dashboard
      - key: JWT_SECRET_KEY
        value: your-jwt-secret-change-this-in-dashboard
      - key: JWT_ACCESS_TOKEN_EXPIRES
        value: "86400"
databases:
  - name: smart-resume-db
    plan: free
